name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # there is too many things we would need to fix before...
  # linting is not feasible at the moment, we need to clean up the code
  # beforehand and then start linting.
  # lint:
  #   name: Lint (ruff)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.10"
  #     - run: pip install ruff
  #     - run: ruff check CFPy/
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install build
      - run: python -m build
